<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pookie 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body {
    margin: 0;
    background: linear-gradient(135deg, #ffd6e0, #ffe9f0);
    font-family: 'Quicksand', sans-serif;
    color: #444;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.card {
    background: #fff;
    padding: 28px 22px;
    border-radius: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    text-align: center;
    max-width: 360px;
    width: 90%;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.2rem;
    color: #ff6f91;
    margin: 0 0 6px;
}

.sub {
    font-size: 0.85rem;
    opacity: 0.6;
    margin-bottom: 10px;
}

.line {
    height: 1px;
    width: 50px;
    background: #ffd1db;
    margin: 12px auto 18px;
}

.message {
    font-size: 1rem;
    line-height: 1.6;
    display: none;
}

button {
    margin-top: 14px;
    padding: 9px 16px;
    border: none;
    background: #ff6f91;
    color: #fff;
    border-radius: 18px;
    cursor: pointer;
    font-size: 0.9rem;
}

.timer {
    margin-top: 14px;
    font-size: 0.8rem;
    color: #888;
}

.heart {
    position: absolute;
    color: #ff6f91;
    font-size: 12px;
    animation: float 6s linear infinite;
    pointer-events: none; /* FIX: clicks pass through */
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>
<body>

<div class="card">
    <h1>Pookie 💕</h1>
    <div class="sub">for arav</div>

    <div class="line"></div>

    <button onclick="showMsg()">tap</button>

    <div id="msg" class="message">
        it’s just been one month… but it doesn’t feel small to me.
        <br><br>
        in this little time, you became someone really important.
        <br><br>
        i don’t always say it… but you matter to me more than you know.
        <br><br>
        happy one month, pookie ❤️
    </div>

    <div class="timer" id="time"></div>
</div>

<script>
function showMsg(){
    document.getElementById("msg").style.display = "block";
}

// TIMER
const start = new Date("2026-02-23");
setInterval(()=>{
    const now = new Date();
    const diff = now - start;
    const days = Math.floor(diff/(1000*60*60*24));
    document.getElementById("time").innerText = days + " days with you 💕";
},1000);

// FLOATING HEARTS (lighter)
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (8 + Math.random()*8) + "px";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },6000);
}
setInterval(createHeart, 700);
</script>

</body>
</html>
